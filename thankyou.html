<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thank You — SMS Law College Varanasi</title>
    <meta name="description" content="Thank you for your enquiry. The SMS Law College admissions team will contact you shortly.">

    <link rel="icon" type="image/png" sizes="50x50" href="assets/favicon.png">
    <link rel="apple-touch-icon" sizes="50x50" href="assets/favicon.png">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700;800;900&family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">

    <style>
        .ty-wrap {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
            background: linear-gradient(135deg, #f8fafc 0%, #eef2ff 100%);
            font-family: 'Poppins', sans-serif;
        }
        .ty-card {
            max-width: 620px;
            width: 100%;
            background: #fff;
            border-radius: 24px;
            padding: 56px 40px;
            text-align: center;
            box-shadow: 0 30px 80px rgba(15, 23, 42, 0.12);
            border: 1px solid rgba(15, 23, 42, 0.05);
        }
        .ty-logo {
            max-width: 160px;
            margin: 0 auto 28px;
            display: block;
        }
        .ty-check {
            width: 92px;
            height: 92px;
            margin: 0 auto 24px;
            border-radius: 50%;
            background: linear-gradient(135deg, #16a34a, #15803d);
            color: #fff;
            font-size: 2.6rem;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 14px 36px rgba(22, 163, 74, 0.35);
        }
        .ty-card h1 {
            font-family: 'Playfair Display', serif;
            font-size: clamp(1.8rem, 4vw, 2.4rem);
            color: #0f172a;
            margin: 0 0 14px;
        }
        .ty-card h1 span { color: #ae1b21; }
        .ty-card p {
            color: #475569;
            font-size: 1rem;
            line-height: 1.7;
            margin: 0 0 28px;
        }
        .ty-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
            margin: 0 0 32px;
        }
        .ty-pill {
            background: #f1f5f9;
            color: #334155;
            padding: 8px 14px;
            border-radius: 999px;
            font-size: 0.85rem;
            font-weight: 500;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        .ty-pill i { color: #ae1b21; }
        .ty-actions {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            justify-content: center;
        }
        .ty-btn {
            padding: 13px 26px;
            border-radius: 12px;
            font-weight: 600;
            font-size: 0.95rem;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }
        .ty-btn:hover { transform: translateY(-2px); }
        .ty-btn-primary {
            background: linear-gradient(135deg, #e93e21, #ae1b21);
            color: #fff;
            box-shadow: 0 10px 24px rgba(174, 27, 33, 0.3);
        }
        .ty-btn-outline {
            background: #fff;
            color: #0f172a;
            border: 1.5px solid #e2e8f0;
        }
    </style>
</head>
<body>
    <div class="ty-wrap">
        <div class="ty-card">
            <img src="assets/logo.png" alt="SMS Law College Varanasi" class="ty-logo">

            <div class="ty-check"><i class="fa-solid fa-check"></i></div>

            <h1>Thank You for <span>Your Enquiry</span></h1>
            <p>
                Your details have been received successfully. Our admissions team will reach out to you within
                <strong>24 hours</strong> to guide you through the B.A. LL.B admission process.
            </p>

            <div class="ty-meta">
                <span class="ty-pill"><i class="fa-solid fa-shield-halved"></i> Bar Council of India Approved</span>
                <span class="ty-pill"><i class="fa-solid fa-clock"></i> Reply within 24 hours</span>
            </div>

            <div class="ty-actions">
                <a href="index.html" class="ty-btn ty-btn-primary">
                    <i class="fa-solid fa-arrow-left"></i> Back to Home
                </a>
                <a href="tel:+918953761555" class="ty-btn ty-btn-outline">
                    <i class="fa-solid fa-phone"></i> Call +91-8953761555
                </a>
            </div>
        </div>
    </div>
</body>
</html>
